<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — ACT-CCS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0030 50%, #0a0a1a 100%);
            display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden;
        }
        body::before {
            content: '';
            position: fixed; inset: 0;
            background: radial-gradient(ellipse at 20% 50%, rgba(120,0,200,0.08) 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 20%, rgba(192,57,43,0.1) 0%, transparent 50%);
            pointer-events: none;
        }
        .login-card {
            background: #fff;
            border-radius: 16px;
            border-top: 5px solid #c0392b;
            box-shadow: 0 0 60px rgba(192,57,43,0.25), 0 20px 60px rgba(0,0,0,0.4);
            width: 92%; max-width: 420px;
            padding: 48px 40px;
            text-align: center;
            position: relative; z-index: 1;
            animation: cardIn .6s cubic-bezier(.22,.61,.36,1);
        }
        @keyframes cardIn { from{opacity:0;transform:translateY(-30px)} to{opacity:1;transform:translateY(0)} }
        .admin-seal {
            width: 76px; height: 76px;
            background: linear-gradient(135deg, #c0392b, #96281b);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            margin: 0 auto 18px;
            box-shadow: 0 4px 20px rgba(192,57,43,.4);
        }
        .admin-seal i { font-size: 32px; color: #fff; }
        h2 { color: #1a1a2e; font-size: 24px; font-weight: 800; margin-bottom: 4px; }
        .subtitle { color: #888; font-size: 13px; margin-bottom: 32px; }
        .restricted-banner {
            display: flex; align-items: center; gap: 8px;
            background: #fdecea; color: #c0392b;
            border: 1px solid #f5c6c6; border-radius: 8px;
            padding: 8px 14px; font-size: 12px; font-weight: 600;
            margin-bottom: 24px; text-align: left;
        }
        .field { margin-bottom: 18px; text-align: left; }
        .field label {
            display: block; font-size: 11px; font-weight: 700;
            color: #666; text-transform: uppercase; letter-spacing: .6px; margin-bottom: 7px;
        }
        .field .input-wrap { position: relative; }
        .field .input-wrap i {
            position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
            color: #aaa; font-size: 14px;
        }
        .field input {
            width: 100%; padding: 13px 14px 13px 40px;
            border: 2px solid #e5e5e5; border-radius: 9px;
            font-size: 14px; transition: border-color .25s, box-shadow .25s;
            background: #fafafa; color: #1a1a2e;
        }
        .field input:focus {
            outline: none; border-color: #c0392b;
            box-shadow: 0 0 0 3px rgba(192,57,43,.12); background: #fff;
        }
        .btn-login {
            width: 100%; padding: 15px;
            background: linear-gradient(135deg, #c0392b 0%, #e74c3c 100%);
            color: #fff; border: none; border-radius: 9px;
            font-size: 15px; font-weight: 700; cursor: pointer;
            transition: all .3s; margin-top: 4px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(192,57,43,.4); }
        .error-box {
            background: #fdecea; color: #c0392b;
            border: 1px solid #f5c6c6; border-radius: 8px;
            padding: 10px 14px; font-size: 13px;
            margin-bottom: 16px; display: none; align-items: center; gap: 8px;
        }
        .error-box.show { display: flex; }
        .back-link {
            display: inline-flex; align-items: center; gap: 6px;
            margin-top: 22px; font-size: 13px; color: #999;
            text-decoration: none; transition: color .2s;
        }
        .back-link:hover { color: #c0392b; }
        .divider { border: none; border-top: 1px solid #f0f0f0; margin: 22px 0 0; }

/* ── Offline Banner ── */
.offline-banner { display:none; position:fixed; top:0; left:0; right:0; background:#e53e3e; color:#fff; text-align:center; padding:12px 20px; font-size:14px; font-weight:600; z-index:99999; box-shadow:0 4px 12px rgba(0,0,0,.3); animation:slideDown .3s ease; }
.offline-banner.show { display:flex; align-items:center; justify-content:center; gap:10px; }
@keyframes slideDown { from{transform:translateY(-100%)} to{transform:translateY(0)} }
.online-toast { display:none; position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#27ae60; color:#fff; padding:12px 28px; border-radius:30px; font-size:14px; font-weight:600; z-index:99999; box-shadow:0 4px 16px rgba(0,0,0,.25); }
.online-toast.show { display:flex; align-items:center; gap:8px; }
    </style>
</head>
<body>
    <div class="offline-banner" id="offlineBanner"><i class="fas fa-wifi"></i><span>No internet connection. Please check your network and try again.</span></div>
    <div class="online-toast" id="onlineToast"><i class="fas fa-check-circle"></i> Back online!</div>

    <div class="login-card">
        <div class="admin-seal"><i class="fas fa-user-shield"></i></div>
        <h2>Dean's Admin Portal</h2>
        <p class="subtitle">ACT-CCS — Authorized Access Only</p>
        <div class="restricted-banner">
            <i class="fas fa-lock"></i>
            This portal is restricted to Dean's Office personnel only.
        </div>
        <div class="error-box" id="errBox">
            <i class="fas fa-exclamation-circle"></i>
            <span id="errText">Invalid credentials. Access denied.</span>
        </div>
        <div class="field">
            <label>Admin ID</label>
            <div class="input-wrap">
                <i class="fas fa-id-badge"></i>
                <input type="text" id="adminId" placeholder="e.g. 00-000000" autocomplete="off">
            </div>
        </div>
        <div class="field">
            <label>Password</label>
            <div class="input-wrap">
                <i class="fas fa-key"></i>
                <input type="password" id="adminPass" placeholder="Enter password"
                    onkeydown="if(event.key==='Enter') doLogin()">
            </div>
        </div>
        <button class="btn-login" onclick="doLogin()">
            <i class="fas fa-sign-in-alt"></i> Login as Admin
        </button>
        <hr class="divider">
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Student / Teacher Portal</a>
    </div>
    <script>
        window.onload = function () {
            try {
                const u = JSON.parse(localStorage.getItem('currentUser') || 'null');
                if (u && u.role === 'admin') window.location.href = 'admin_dashboard.html';
            } catch(e) {}
        };
        function doLogin() {
            const id   = document.getElementById('adminId').value.trim();
            const pass = document.getElementById('adminPass').value;
            const err  = document.getElementById('errBox');
            if (id === '00-000000' && pass === 'admin123') {
                localStorage.setItem('currentUser', JSON.stringify({
                    name: 'Dean Admin', idNumber: '00-000000',
                    email: 'admin@act-ccs.edu.ph', role: 'admin'
                }));
                window.location.href = 'admin_dashboard.html';
            } else {
                err.classList.add('show');
                setTimeout(() => err.classList.remove('show'), 4000);
            }
        }
    </script>

    <script>
    function updateOnlineStatus() {
        const banner = document.getElementById('offlineBanner');
        const toast  = document.getElementById('onlineToast');
        if (!navigator.onLine) {
            if (banner) banner.classList.add('show');
        } else {
            if (banner && banner.classList.contains('show')) {
                banner.classList.remove('show');
                if (toast) { toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 3000); }
            }
        }
    }
    window.addEventListener('online', updateOnlineStatus);
    window.addEventListener('offline', updateOnlineStatus);
    document.addEventListener('DOMContentLoaded', updateOnlineStatus);
    </script>
</body>
</html>
